# Promote Release — after final release.yml has created the git tag and draft GitHub Release
#
# 1. validate: semver, draft GitHub Release for X.Y.Z, release PR approved and CI green
# 2. promote: publish (undraft) GitHub Release
# 3. merge: merge release/X.Y.Z PR to main (triggers sync-main-to-dev)
# 4. cleanup (best-effort): delete remote git RC tags matching X.Y.Z-rc* with no GitHub Release
#
# See docs/DOWNSTREAM_RELEASE.md. No GHCR/cosign/smoke-test gate (project-specific).
name: Promote Release

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to promote (e.g., 1.2.3)"
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-image:
    name: Resolve image tag
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    outputs:
      image-tag: ${{ steps.resolve.outputs.image-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .vig-os
            .github/actions/resolve-image
          sparse-checkout-cone-mode: false

      - name: Resolve container image
        id: resolve
        uses: ./.github/actions/resolve-image

  validate:
    name: Validate promote prerequisites
    needs: [resolve-image]
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
    timeout-minutes: 15
    outputs:
      version: ${{ steps.vars.outputs.version }}
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        shell: bash
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Generate release app token
        id: release_app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Validate version
        id: vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format '$VERSION'"
            echo "Version must follow semantic versioning: MAJOR.MINOR.PATCH (e.g., 1.2.3)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✓ Version=$VERSION"

      - name: Verify draft GitHub Release exists
        env:
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          RETRIES=5
          LAST_ERROR=""
          RELEASE_JSON=""
          for i in $(seq 1 "$RETRIES"); do
            API_OUTPUT=""
            if API_OUTPUT=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate 2>&1); then
              MATCHED=$(printf '%s' "$API_OUTPUT" | \
                jq -s --arg tag "$VERSION" 'flatten | map(select(.tag_name == $tag)) | .[0] // empty' 2>/dev/null)
              if printf '%s' "$MATCHED" | jq -e 'type == "object"' >/dev/null 2>&1; then
                RELEASE_JSON="$MATCHED"
                break
              fi
              LAST_ERROR="No release found for tag $VERSION (not in releases list yet)"
              if [ "$i" -lt "$RETRIES" ]; then
                sleep $((i * 5))
                continue
              fi
              break
            fi
            LAST_ERROR="$API_OUTPUT"
            if printf '%s' "$API_OUTPUT" | grep -Eqi "401|403|forbidden|bad credentials"; then
              echo "$API_OUTPUT"
              exit 1
            fi
            if printf '%s' "$API_OUTPUT" | grep -Eqi "404|not found"; then
              if [ "$i" -lt "$RETRIES" ]; then
                sleep $((i * 5))
                continue
              fi
              break
            fi
            if printf '%s' "$API_OUTPUT" | grep -Eqi "429|5[0-9]{2}"; then
              if [ "$i" -lt "$RETRIES" ]; then
                sleep $((i * 5))
                continue
              fi
            fi
            echo "ERROR: Unexpected response querying release for tag $VERSION"
            echo "$API_OUTPUT"
            exit 1
          done
          if [ -z "$RELEASE_JSON" ]; then
            echo "ERROR: No GitHub Release for tag $VERSION"
            if [ -n "$LAST_ERROR" ]; then
              echo "$LAST_ERROR"
            fi
            exit 1
          fi
          IS_DRAFT=$(printf '%s' "$RELEASE_JSON" | jq -r '.draft')
          if [ "$IS_DRAFT" != "true" ]; then
            echo "ERROR: GitHub Release for $VERSION must still be a draft (got draft=$IS_DRAFT)"
            exit 1
          fi
          echo "✓ Draft GitHub Release exists for $VERSION"

      - name: Find and verify release PR
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
        run: |
          set -euo pipefail
          PR_JSON=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh pr list \
            --head "release/$VERSION" \
            --base main \
            --json number,isDraft,reviewDecision,statusCheckRollup \
            --limit 1)

          PR_COUNT=$(echo "$PR_JSON" | jq 'length')
          if [ "$PR_COUNT" != "1" ]; then
            echo "ERROR: Expected exactly 1 PR from release/$VERSION to main, found $PR_COUNT"
            exit 1
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')
          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.[0].isDraft')
          REVIEW_DECISION=$(echo "$PR_JSON" | jq -r '.[0].reviewDecision')

          if [ "$IS_DRAFT" = "true" ]; then
            echo "ERROR: PR #$PR_NUMBER is still in draft"
            exit 1
          fi
          if [ "$REVIEW_DECISION" = "APPROVED" ]; then
            echo "PR #$PR_NUMBER is approved"
          elif [ "$REVIEW_DECISION" = "null" ] || [ -z "$REVIEW_DECISION" ]; then
            APPROVED_COUNT=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh api \
              --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
              | jq 'add | map(select(.state == "APPROVED")) | length')
            if [ "$APPROVED_COUNT" -eq 0 ]; then
              echo "ERROR: PR #$PR_NUMBER is not approved (reviewDecision: $REVIEW_DECISION, approved reviews: 0)"
              exit 1
            fi
            echo "reviewDecision='$REVIEW_DECISION' but $APPROVED_COUNT approved review(s) found"
          else
            echo "ERROR: PR #$PR_NUMBER is not approved (status: $REVIEW_DECISION)"
            exit 1
          fi

          STATUS_ROLLUP=$(echo "$PR_JSON" | jq -r '.[0].statusCheckRollup // []')
          CI_FAILED=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "FAILURE" or .conclusion == "ERROR")] | length')
          if [ "$CI_FAILED" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has failed CI checks"
            exit 1
          fi

          CI_PENDING=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == null or .conclusion == "" or .conclusion == "PENDING" or .conclusion == "IN_PROGRESS" or .conclusion == "QUEUED")] | length')
          if [ "$CI_PENDING" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has checks still in progress"
            exit 1
          fi

          CI_SUCCESS=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "SUCCESS")] | length')
          if [ "$CI_SUCCESS" = "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has no successful CI checks"
            exit 1
          fi

          echo "✓ PR #$PR_NUMBER verified for promote"

      - name: Summary
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          echo "✓ All promote validation checks passed for $VERSION"

  promote:
    name: Publish GitHub Release
    needs: [resolve-image, validate]
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
    timeout-minutes: 10
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Generate release app token
        id: release_app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh release edit "$VERSION" --draft=false
          echo "✓ GitHub Release $VERSION published (no longer draft)"

      - name: Summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          echo "✓ Promoted $VERSION: GitHub Release published"

  merge:
    name: Merge release PR to main
    needs: [resolve-image, validate, promote]
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        shell: bash
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Generate release app token
        id: release_app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Find and verify release PR
        id: pr
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
        run: |
          set -euo pipefail
          RELEASE_BRANCH="release/$VERSION"

          PR_JSON=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --json number,isDraft,reviewDecision,statusCheckRollup \
            --limit 1)

          PR_COUNT=$(echo "$PR_JSON" | jq 'length')

          if [ "$PR_COUNT" != "1" ]; then
            if [ "$PR_COUNT" = "0" ]; then
              echo "ERROR: No PR found from $RELEASE_BRANCH to main"
              exit 1
            else
              echo "ERROR: Multiple PRs found from $RELEASE_BRANCH to main"
              exit 1
            fi
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')
          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.[0].isDraft')
          REVIEW_DECISION=$(echo "$PR_JSON" | jq -r '.[0].reviewDecision')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          if [ "$IS_DRAFT" = "true" ]; then
            echo "ERROR: PR #$PR_NUMBER is still in draft status"
            exit 1
          fi

          if [ "$REVIEW_DECISION" = "APPROVED" ]; then
            echo "PR #$PR_NUMBER is approved"
          elif [ "$REVIEW_DECISION" = "null" ] || [ -z "$REVIEW_DECISION" ]; then
            APPROVED_COUNT=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh api \
              --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
              | jq 'add | map(select(.state == "APPROVED")) | length')
            if [ "$APPROVED_COUNT" -eq 0 ]; then
              echo "ERROR: PR #$PR_NUMBER does not have approvals"
              exit 1
            fi
            echo "PR #$PR_NUMBER has $APPROVED_COUNT approved review(s)"
          else
            echo "ERROR: PR #$PR_NUMBER does not have approvals (status: $REVIEW_DECISION)"
            exit 1
          fi

          STATUS_ROLLUP=$(echo "$PR_JSON" | jq -r '.[0].statusCheckRollup // []')
          CI_FAILED=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "FAILURE" or .conclusion == "ERROR")] | length')
          if [ "$CI_FAILED" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has failed CI checks"
            exit 1
          fi

          CI_PENDING=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == null or .conclusion == "" or .conclusion == "PENDING" or .conclusion == "IN_PROGRESS" or .conclusion == "QUEUED")] | length')
          if [ "$CI_PENDING" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has checks still in progress"
            exit 1
          fi

          CI_SUCCESS=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "SUCCESS")] | length')
          if [ "$CI_SUCCESS" = "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has no successful CI checks"
            exit 1
          fi

          echo "✓ PR #$PR_NUMBER verified for merge"

      - name: Merge release PR
        env:
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh pr merge "$PR_NUMBER" --merge
          echo "✓ Merged PR #$PR_NUMBER to main"

      - name: Summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          echo "✓ Release $VERSION promoted; PR #$PR_NUMBER merged to main (sync-main-to-dev may run next)"

  cleanup:
    name: Cleanup git RC tags
    needs: [resolve-image, validate, promote, merge]
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
    timeout-minutes: 15
    if: ${{ needs.merge.result == 'success' }}
    continue-on-error: true
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Generate release app token
        id: release_app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Delete git RC tags without GitHub Release
        env:
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAGS=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
            git ls-remote --tags --refs "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${VERSION}-rc*" \
            | awk '{print $2}' | sed 's#refs/tags/##' || true)
          if [ -z "$TAGS" ]; then
            echo "No remote RC tags matching ${VERSION}-rc*"
            exit 0
          fi
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            RAW=""
            if ! RAW=$(retry --retries 2 --backoff 3 --max-backoff 10 -- \
              gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate 2>&1); then
              echo "WARN: release lookup failed for tag $tag, skipping deletion"
              continue
            fi
            if printf '%s' "$RAW" | \
              jq -s --arg tag "$tag" 'flatten | map(select(.tag_name == $tag)) | .[0] // empty' 2>/dev/null | \
              jq -e 'type == "object"' >/dev/null 2>&1; then
              echo "Skipping tag $tag (GitHub Release exists)"
              continue
            fi
            echo "Deleting remote tag $tag (no GitHub Release)"
            retry --retries 3 --backoff 5 --max-backoff 30 -- \
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}" \
              || echo "WARN: failed to delete tag $tag"
          done <<< "$TAGS"
          echo "✓ Git RC tag cleanup complete for $VERSION"
