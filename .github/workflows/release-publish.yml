# Publishes git tag and optionally a GitHub Release. Final releases always get a draft release.
# Candidates get a draft pre-release only when create_release is true (workflow_dispatch input).
name: Release Publish

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      version:
        description: "Semantic version to release (e.g., 1.2.3)"
        required: true
        type: string
      finalize_sha:
        description: "Finalized commit SHA to publish"
        required: true
        type: string
      release_date:
        description: "Release date used for summary output"
        required: true
        type: string
      publish_version:
        description: "Version tag to publish (X.Y.Z or X.Y.Z-rcN)"
        required: true
        type: string
      release_kind:
        description: "Release kind (candidate or final)"
        required: true
        type: string
      git_user_name:
        description: "Git user name for release tag operations"
        required: false
        default: "github-actions[bot]"
        type: string
      git_user_email:
        description: "Git user email for release tag operations"
        required: false
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        type: string
      tag_already_exists:
        description: "Skip tag create/push when remote tag already points at finalize SHA"
        required: false
        default: false
        type: boolean
      create_release:
        description: "For candidates: create draft GitHub pre-release (default false = tag only)"
        required: false
        default: false
        type: boolean
    secrets:
      token:
        required: false
    outputs:
      tag:
        description: "Published tag"
        value: ${{ jobs.publish.outputs.tag }}
      release_url:
        description: "Published release URL"
        value: ${{ jobs.publish.outputs.release_url }}

permissions:
  contents: read

jobs:
  resolve-image:
    name: Resolve image tag
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    outputs:
      image-tag: ${{ steps.resolve.outputs.image-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .vig-os
            .github/actions/resolve-image
          sparse-checkout-cone-mode: false

      - name: Resolve container image
        id: resolve
        uses: ./.github/actions/resolve-image

  publish:
    name: Publish Release
    needs: [resolve-image]
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.out.outputs.tag }}
      release_url: ${{ steps.out.outputs.release_url }}

    steps:
      - name: Generate release app token
        id: release_app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Resolve auth token
        id: auth
        env:
          PROVIDED_TOKEN: ${{ secrets.token }}
          FALLBACK_TOKEN: ${{ steps.release_app_token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -n "${PROVIDED_TOKEN:-}" ]; then
            echo "token=$PROVIDED_TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "token=$FALLBACK_TOKEN" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release kind
        env:
          RELEASE_KIND: ${{ inputs.release_kind }}
        run: |
          set -euo pipefail
          if [ "$RELEASE_KIND" != "candidate" ] && [ "$RELEASE_KIND" != "final" ]; then
            echo "ERROR: Invalid release_kind '$RELEASE_KIND'"
            echo "release_kind must be one of: candidate, final"
            exit 1
          fi

      - name: Checkout finalized commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.finalize_sha }}
          fetch-depth: 0
          token: ${{ steps.auth.outputs.token }}

      - name: Fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure git
        env:
          GIT_USER_NAME: ${{ inputs.git_user_name }}
          GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

      - name: Create and push tag
        if: ${{ !inputs.tag_already_exists }}
        env:
          PUBLISH_VERSION: ${{ inputs.publish_version }}
        run: |
          set -euo pipefail
          git tag -a "$PUBLISH_VERSION" -m "Release $PUBLISH_VERSION"
          if ! retry --retries 3 --backoff 5 --max-backoff 30 -- git push origin "$PUBLISH_VERSION"; then
            if retry --retries 3 --backoff 5 --max-backoff 30 -- git ls-remote --tags --refs origin "$PUBLISH_VERSION" | grep -q "refs/tags/$PUBLISH_VERSION$"; then
              LOCAL_TAG_TARGET_SHA=$(git rev-parse "$PUBLISH_VERSION^{}")
              REMOTE_TAG_TARGET_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- git ls-remote --tags origin "refs/tags/$PUBLISH_VERSION^{}" | awk '{print $1}')
              if [ -z "$REMOTE_TAG_TARGET_SHA" ]; then
                REMOTE_TAG_TARGET_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- git ls-remote --tags origin "refs/tags/$PUBLISH_VERSION" | awk '{print $1}')
              fi
              if [ -z "$REMOTE_TAG_TARGET_SHA" ]; then
                echo "ERROR: Remote tag exists but target SHA could not be resolved: $PUBLISH_VERSION"
                exit 1
              fi
              if [ "$REMOTE_TAG_TARGET_SHA" != "$LOCAL_TAG_TARGET_SHA" ]; then
                echo "ERROR: Remote tag target SHA mismatch for $PUBLISH_VERSION"
                echo "Local tag target:  $LOCAL_TAG_TARGET_SHA"
                echo "Remote tag target: $REMOTE_TAG_TARGET_SHA"
                exit 1
              fi
              echo "Tag already present on origin with matching target SHA: $PUBLISH_VERSION"
            else
              echo "ERROR: Failed to push tag $PUBLISH_VERSION"
              exit 1
            fi
          fi

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          awk -v version="$VERSION" '
            index($0, "## [" version "]") == 1 {found=1; next}
            /^## \[/ && found {found=0}
            found
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No changelog notes found for $VERSION" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.release_kind == 'final' || (inputs.release_kind == 'candidate' && inputs.create_release) }}
        env:
          PUBLISH_VERSION: ${{ inputs.publish_version }}
          RELEASE_KIND: ${{ inputs.release_kind }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          if RELEASE_JSON=$(retry --retries 2 --backoff 5 --max-backoff 20 -- gh release view "$PUBLISH_VERSION" --json isDraft,isPrerelease 2>/dev/null); then
            IS_DRAFT=$(printf '%s' "$RELEASE_JSON" | jq -r '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Draft GitHub Release already exists for $PUBLISH_VERSION; skipping create (retry path)."
              exit 0
            fi
            if [ "$RELEASE_KIND" = "candidate" ]; then
              IS_PRERELEASE=$(printf '%s' "$RELEASE_JSON" | jq -r '.isPrerelease')
              if [ "$IS_PRERELEASE" = "true" ]; then
                echo "Pre-release already exists for $PUBLISH_VERSION; skipping create (candidate retry path)."
                exit 0
              fi
            fi
            echo "ERROR: Published (non-draft) GitHub Release already exists for tag $PUBLISH_VERSION"
            exit 1
          fi
          if [ "$RELEASE_KIND" = "candidate" ]; then
            retry --retries 3 --backoff 5 --max-backoff 30 -- gh release create "$PUBLISH_VERSION" \
              --title "$PUBLISH_VERSION" \
              --notes-file /tmp/release-notes.md \
              --verify-tag \
              --draft \
              --prerelease
          else
            retry --retries 3 --backoff 5 --max-backoff 30 -- gh release create "$PUBLISH_VERSION" \
              --title "$PUBLISH_VERSION" \
              --notes-file /tmp/release-notes.md \
              --verify-tag \
              --draft
            echo "Draft GitHub Release created; publish from ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases when review is complete."
          fi

      - name: Set outputs
        id: out
        env:
          PUBLISH_VERSION: ${{ inputs.publish_version }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.publish_version }}
        run: |
          echo "tag=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
