name: Release

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (e.g., 1.2.3)"
        required: true
        type: string
      release-kind:
        description: "Release mode: candidate publishes X.Y.Z-rcN, final publishes X.Y.Z"
        required: false
        default: "candidate"
        type: string
      dry-run:
        description: "Validate without making changes"
        required: false
        default: false
        type: boolean
      git-user-name:
        description: "Git user name for release commits"
        required: false
        default: "github-actions[bot]"
        type: string
      git-user-email:
        description: "Git user email for release commits"
        required: false
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        type: string
      rc-number:
        description: "Candidate RC index (e.g. 21 for X.Y.Z-rc21). Omit to auto-increment from existing tags."
        required: false
        default: ""
        type: string
      create-release:
        description: "For candidates only: create a draft GitHub pre-release (default tag-only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-image:
    name: Resolve image tag
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    outputs:
      image-tag: ${{ steps.resolve.outputs.image-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .vig-os
            .github/actions/resolve-image
          sparse-checkout-cone-mode: false

      - name: Resolve container image
        id: resolve
        uses: ./.github/actions/resolve-image

  core:
    name: Release Core
    uses: ./.github/workflows/release-core.yml
    permissions:
      actions: write
      contents: write
      pull-requests: read
    with:
      version: ${{ inputs.version }}
      release_kind: ${{ inputs.release-kind }}
      dry_run: ${{ inputs.dry-run }}
      git_user_name: ${{ inputs.git-user-name }}
      git_user_email: ${{ inputs.git-user-email }}
      rc_number: ${{ inputs.rc-number || '' }}
    secrets: inherit

  extension:
    name: Release Extension
    needs: core
    if: ${{ inputs.dry-run != true }}
    uses: ./.github/workflows/release-extension.yml
    with:
      version: ${{ needs.core.outputs.version }}
      finalize_sha: ${{ needs.core.outputs.finalize_sha }}
      release_date: ${{ needs.core.outputs.release_date }}
      release_kind: ${{ needs.core.outputs.release_kind }}
      publish_version: ${{ needs.core.outputs.publish_version }}
    secrets: inherit

  publish:
    name: Publish Release
    needs: [core, extension]
    if: ${{ inputs.dry-run != true }}
    uses: ./.github/workflows/release-publish.yml
    permissions:
      contents: write
    with:
      version: ${{ needs.core.outputs.version }}
      finalize_sha: ${{ needs.core.outputs.finalize_sha }}
      release_date: ${{ needs.core.outputs.release_date }}
      publish_version: ${{ needs.core.outputs.publish_version }}
      release_kind: ${{ needs.core.outputs.release_kind }}
      git_user_name: ${{ inputs.git-user-name }}
      git_user_email: ${{ inputs.git-user-email }}
      tag_already_exists: ${{ needs.core.outputs.tag_already_exists == 'true' }}
      create_release: ${{ inputs.create-release }}
    secrets: inherit

  rollback:
    name: Rollback on Failure
    needs: [resolve-image, core, extension, publish]
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    if: >-
      ${{
        always() &&
        inputs.dry-run != true &&
        needs.resolve-image.result == 'success' &&
        (
          needs.core.result == 'failure' ||
          needs.extension.result == 'failure' ||
          needs.publish.result == 'failure'
        )
      }}
    permissions:
      contents: write
      issues: write
    steps:
      - name: Generate release app token
        id: release_app_token
        if: ${{ needs.core.outputs.version != '' }}
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Generate commit app token
        id: commit_app_token
        if: ${{ needs.core.outputs.pre_finalize_sha != '' }}
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3
        with:
          app-id: ${{ secrets.COMMIT_APP_ID }}
          private-key: ${{ secrets.COMMIT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        if: ${{ needs.core.outputs.pre_finalize_sha != '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.commit_app_token.outputs.token }}

      - name: Fix git safe.directory
        if: ${{ needs.core.outputs.pre_finalize_sha != '' }}
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure git
        if: ${{ needs.core.outputs.pre_finalize_sha != '' }}
        env:
          GIT_USER_NAME: ${{ inputs.git-user-name }}
          GIT_USER_EMAIL: ${{ inputs.git-user-email }}
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

      - name: Rollback release branch
        if: ${{ needs.core.outputs.pre_finalize_sha != '' }}
        continue-on-error: true
        env:
          VERSION: ${{ needs.core.outputs.version }}
          PRE_SHA: ${{ needs.core.outputs.pre_finalize_sha }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 3 --max-backoff 20 -- git fetch origin "release/$VERSION"
          git checkout "release/$VERSION"
          if git reset --hard "$PRE_SHA" 2>/dev/null; then
            if retry --retries 3 --backoff 5 --max-backoff 30 -- git push --force-with-lease origin "release/$VERSION"; then
              echo "Release branch rolled back"
            fi
          fi

      - name: Create failure issue
        if: ${{ needs.core.outputs.version != '' }}
        env:
          VERSION: ${{ needs.core.outputs.version }}
          PR_NUMBER: ${{ needs.core.outputs.pr_number }}
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          retry --retries 3 --backoff 5 --max-backoff 30 -- gh issue create \
            --title "Release $VERSION failed — automatic rollback" \
            --label "bug" \
            --body "Release $VERSION failed during the automated release workflow.

          **Workflow Run:** [View logs]($WORKFLOW_URL)
          **Release PR:** #$PR_NUMBER

          **Automatic rollback attempted:**
          - Release branch reset to pre-finalization state (best-effort)

          **Tag status (forward-fix policy):**
          - Release tags are not deleted by automation (workflow choice; GitHub immutable-release lock-in applies only after a release is **published** when that setting is enabled). If a tag was pushed before the failure, it remains on the remote.
          - Use a new release candidate to validate fixes, then re-run the final release when ready.
          - If a draft GitHub Release exists, manage it from the Releases UI; **publishing** locks the linked tag and assets when **immutable releases** are enabled."
